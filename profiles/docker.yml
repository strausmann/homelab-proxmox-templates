# Docker-Profil: Wird fuer Docker-Nodes zusaetzlich zum Base-Profil geladen
---
packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

apt_sources:
  - name: docker
    url: "https://download.docker.com/linux/ubuntu"
    gpg_url: "https://download.docker.com/linux/ubuntu/gpg"
    gpg_dest: "/etc/apt/keyrings/docker.asc"
    suite: "noble"  # Ubuntu 24.04 Codename
    component: "stable"
    arch: "amd64"

docker_daemon_config:
  log-driver: "json-file"
  log-opts:
    max-size: "10m"
    max-file: "3"
  storage-driver: "overlay2"
  live-restore: true
  default-address-pools:
    - base: "172.20.0.0/14"
      size: 24
  metrics-addr: "0.0.0.0:9323"
  experimental: true
  features:
    buildkit: true

docker_stacks_dir: "/docker/stacks"
