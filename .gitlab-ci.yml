---
stages:
  - validate
  - build
  - release

variables:
  PACKER_CACHE_DIR: /build/packer_cache
  TEMPLATE_BASE_ID: "9000"
  GITLAB_PROJECT_URL: "https://git.strausmann.de/strausmann/proxmox-templates"

# --- Validate Stage ---
packer_validate:
  stage: validate
  script:
    - cd packer/linux/ubuntu-2404
    - packer init .
    - |
      packer validate \
        -var "proxmox_url=${PKR_VAR_proxmox_url}" \
        -var "proxmox_username=${PKR_VAR_proxmox_username}" \
        -var "proxmox_token=${PKR_VAR_proxmox_token}" \
        -var "proxmox_node=${PKR_VAR_proxmox_node:-PVE1}" \
        -var "proxmox_skip_tls=true" \
        -var "vm_storage_pool=${PKR_VAR_vm_storage_pool:-nvme}" \
        -var "vm_bridge=${PKR_VAR_vm_bridge:-vnet60}" \
        -var "iso_file=${PKR_VAR_iso_file:-datacenter:iso/ubuntu-24.04.4-live-server-amd64.iso}" \
        .
  tags:
    - packer
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH
      changes:
        - packer/**/*
        - profiles/**/*
        - ansible/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# --- Build Stage ---
build_ubuntu_2404:
  stage: build
  script:
    - cd packer/linux/ubuntu-2404
    - packer init .
    - |
      # Versionierte VM-ID und Template-Name
      BUILD_DATE=$(date +%Y%m%d)
      BUILD_NUM=${CI_PIPELINE_IID:-1}
      VM_ID=$((TEMPLATE_BASE_ID + BUILD_NUM))
      TEMPLATE_NAME="tmpl-ubuntu-2404-${BUILD_DATE}-b${BUILD_NUM}"

      # Letzten Git-Tag ermitteln
      GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "unreleased")

      echo "================================================="
      echo "  Template Build: ${TEMPLATE_NAME}"
      echo "  VM-ID: ${VM_ID}"
      echo "  Pipeline: ${CI_PIPELINE_IID} (${CI_PIPELINE_SOURCE})"
      echo "  Commit: ${CI_COMMIT_SHORT_SHA} (${CI_COMMIT_REF_NAME})"
      echo "  Release: ${GIT_TAG}"
      echo "================================================="

      # Pruefen ob die VM-ID bereits existiert
      HTTP_CODE=$(curl -sfk -o /dev/null -w "%{http_code}" \
        "${PKR_VAR_proxmox_url}/nodes/${PKR_VAR_proxmox_node:-PVE1}/qemu/${VM_ID}/status/current" \
        -H "Authorization: PVEAPIToken=${PKR_VAR_proxmox_username}=${PKR_VAR_proxmox_token}" 2>/dev/null || echo "000")
      if [ "$HTTP_CODE" = "200" ]; then
        echo "WARNUNG: VM-ID ${VM_ID} existiert bereits. Verwende naechste freie ID."
        VM_ID=$((VM_ID + 100))
        TEMPLATE_NAME="tmpl-ubuntu-2404-${BUILD_DATE}-b${BUILD_NUM}-r"
      fi

      packer build \
        -var "proxmox_url=${PKR_VAR_proxmox_url}" \
        -var "proxmox_username=${PKR_VAR_proxmox_username}" \
        -var "proxmox_token=${PKR_VAR_proxmox_token}" \
        -var "proxmox_node=${PKR_VAR_proxmox_node:-PVE1}" \
        -var "proxmox_skip_tls=true" \
        -var "vm_storage_pool=${PKR_VAR_vm_storage_pool:-nvme}" \
        -var "vm_bridge=${PKR_VAR_vm_bridge:-vnet60}" \
        -var "iso_file=${PKR_VAR_iso_file:-datacenter:iso/ubuntu-24.04.4-live-server-amd64.iso}" \
        -var "vm_id=${VM_ID}" \
        -var "vm_name=ubuntu-2404-packer-${BUILD_NUM}" \
        -var "template_name=${TEMPLATE_NAME}" \
        -var "ci_pipeline_id=${CI_PIPELINE_ID}" \
        -var "ci_pipeline_source=${CI_PIPELINE_SOURCE}" \
        -var "ci_commit_sha=${CI_COMMIT_SHA}" \
        -var "ci_commit_ref=${CI_COMMIT_REF_NAME}" \
        -var "git_release_tag=${GIT_TAG}" \
        -on-error=cleanup \
        .

      echo ""
      echo "================================================="
      echo "  Template erfolgreich erstellt!"
      echo "  Name:     ${TEMPLATE_NAME}"
      echo "  VM-ID:    ${VM_ID}"
      echo "  Tags:     latest, os-ubuntu, v-2404, packer"
      echo "  Release:  ${GITLAB_PROJECT_URL}/-/releases/${GIT_TAG}"
      echo "  Pipeline: ${GITLAB_PROJECT_URL}/-/pipelines/${CI_PIPELINE_ID}"
      echo "================================================="
  tags:
    - packer
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - packer/linux/ubuntu-2404/**/*
        - profiles/base.yml
        - ansible/playbooks/packer-hardening.yml
      when: manual
      allow_failure: true

# --- Release Stage ---
release:
  stage: release
  image: node:22-slim
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npx --no-install semantic-release
  tags:
    - packer
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH
      when: never
