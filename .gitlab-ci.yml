---
stages:
  - validate
  - build
  - release

variables:
  # Proxmox Verbindung (CI/CD Variablen)
  # PKR_VAR_proxmox_url, PKR_VAR_proxmox_username, PKR_VAR_proxmox_token
  # PKR_VAR_proxmox_node, PKR_VAR_vm_storage_pool, PKR_VAR_vm_bridge
  # werden als CI/CD Variablen gesetzt (masked + protected)
  PACKER_CACHE_DIR: /build/packer_cache

# --- Validate Stage ---
packer_validate:
  stage: validate
  before_script:
    - packer init packer/linux/ubuntu-2404/
  script:
    - |
      packer validate \
        -var "proxmox_url=${PKR_VAR_proxmox_url}" \
        -var "proxmox_username=${PKR_VAR_proxmox_username}" \
        -var "proxmox_token=${PKR_VAR_proxmox_token}" \
        -var "proxmox_node=${PKR_VAR_proxmox_node:-PVE1}" \
        -var "proxmox_skip_tls=true" \
        -var "vm_storage_pool=${PKR_VAR_vm_storage_pool:-nvme}" \
        -var "vm_bridge=${PKR_VAR_vm_bridge:-vnet60}" \
        -var "iso_file=${PKR_VAR_iso_file:-datacenter:iso/ubuntu-24.04.4-live-server-amd64.iso}" \
        packer/linux/ubuntu-2404/
  tags:
    - packer
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH
      changes:
        - packer/**/*
        - profiles/**/*
        - ansible/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# --- Build Stage ---
build_ubuntu_2404:
  stage: build
  before_script:
    - packer init packer/linux/ubuntu-2404/
  script:
    - |
      # Template loeschen falls es bereits existiert (Rebuild-Szenario)
      curl -sfk -X DELETE \
        "https://${PKR_VAR_proxmox_url##https://}/nodes/${PKR_VAR_proxmox_node:-PVE1}/qemu/${PKR_VAR_vm_id:-9000}?purge=1&destroy-unreferenced-disks=1" \
        -H "Authorization: PVEAPIToken=${PKR_VAR_proxmox_username}=${PKR_VAR_proxmox_token}" \
        2>/dev/null || true
      sleep 5

      packer build \
        -var "proxmox_url=${PKR_VAR_proxmox_url}" \
        -var "proxmox_username=${PKR_VAR_proxmox_username}" \
        -var "proxmox_token=${PKR_VAR_proxmox_token}" \
        -var "proxmox_node=${PKR_VAR_proxmox_node:-PVE1}" \
        -var "proxmox_skip_tls=true" \
        -var "vm_storage_pool=${PKR_VAR_vm_storage_pool:-nvme}" \
        -var "vm_bridge=${PKR_VAR_vm_bridge:-vnet60}" \
        -var "iso_file=${PKR_VAR_iso_file:-datacenter:iso/ubuntu-24.04.4-live-server-amd64.iso}" \
        -on-error=cleanup \
        packer/linux/ubuntu-2404/
  tags:
    - packer
  rules:
    # Manueller Trigger via Web UI
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    # Scheduled (monatlich)
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Nach Merge auf main wenn sich relevante Dateien geaendert haben
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - packer/linux/ubuntu-2404/**/*
        - profiles/base.yml
        - ansible/playbooks/packer-hardening.yml
      when: manual
      allow_failure: true

# --- Release Stage ---
release:
  stage: release
  image: node:22-slim
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npx --no-install semantic-release
  tags:
    - packer
  rules:
    # Trigger eines Scheduled Task
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Nie bei normalen Pushes
    - if: $CI_COMMIT_BRANCH
      when: never
