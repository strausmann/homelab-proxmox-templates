  extends: .tag_rotation_base
  needs:
    - job: build_ubuntu_2604
      artifacts: true
  variables:
    TEMPLATE_OS: ubuntu
    TEMPLATE_VERSION: "2604"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - packer/linux/ubuntu-2604/**/*
        - profiles/base.yml
        - ansible/playbooks/packer-hardening.yml

