---
# Pipeline-Level Filter: Doku-Only Commits triggern keine Template-Builds.
# Grund: README.md und CHANGELOG.md liegen pro Template unter packer/linux/**.
# Die changes:-Regeln der einzelnen Jobs matchen /**/* und wuerden damit auch
# reine Doku-Aenderungen einen ~20-Min Build ausloesen. Filter hier zentral.
workflow:
  rules:
    # docs(...) Commits laut Conventional-Commits-Konvention (CLAUDE.md)
    - if: $CI_COMMIT_TITLE =~ /^docs(\(.*\))?:/i
      when: never
    # Escape-Hatch fuer manuelle Pipeline-Unterdrueckung
    - if: $CI_COMMIT_TITLE =~ /\[skip ci\]/i
      when: never
    # Alles andere wie gehabt
    - when: always

stages:
  - validate
  - build
  - deploy
  - release

variables:
  PACKER_CACHE_DIR: /build/packer_cache
  GITLAB_PROJECT_URL: "https://git.strausmann.de/strausmann/proxmox-templates"
  # KEEP_FAILED_VM und PACKER_ON_ERROR NICHT global als Default setzen —
  # sonst bleiben bei JEDEM Build (2404, 2604, docker etc.) fehlgeschlagene
  # VMs auf Proxmox stehen und verstopfen den Node.
  # Zum Debugging einzelner Builds per Push-Option:
  #   git push -o ci.variable="KEEP_FAILED_VM=true" -o ci.variable="PACKER_ON_ERROR=abort"
  # Oder per Pipeline "Run Pipeline" mit Variable-Input.

# =============================================================================
# Hidden Jobs (Base Templates)
# =============================================================================

.packer_validate_base:
  stage: validate
  tags:
    - packer
  script:
    - cd ${PACKER_DIR}
    - packer init .
    - |
      packer validate \
        -var "proxmox_url=${PKR_VAR_proxmox_url}" \
        -var "proxmox_username=${PKR_VAR_proxmox_username}" \
        -var "proxmox_token=${PKR_VAR_proxmox_token}" \
        -var "proxmox_node=${PKR_VAR_proxmox_node:-PVE1}" \
        -var "proxmox_skip_tls=true" \
        -var "vm_storage_pool=${PKR_VAR_vm_storage_pool:-nvme}" \
        -var "vm_bridge=${PKR_VAR_vm_bridge:-vnet60}" \
        -var "iso_file=${PKR_VAR_iso_file:-${DEFAULT_ISO_FILE}}" \
        .

.packer_build_base:
  stage: build
  tags:
    - packer
  timeout: 90 minutes
  resource_group: packer_build_${TEMPLATE_OS}_${TEMPLATE_VERSION}
  script:
    - cd ${PACKER_DIR}
    - packer init .
    - |
      # Versionierte VM-ID und Template-Name
      BUILD_DATE=$(date +%Y%m%d)
      BUILD_NUM=${CI_PIPELINE_IID:-1}
      TEMPLATE_NAME="tmpl-${TEMPLATE_OS}-${TEMPLATE_VERSION}-${BUILD_DATE}-b${BUILD_NUM}"

      # Naechste freie VM-ID im Bereich TEMPLATE_BASE_ID bis TEMPLATE_BASE_ID+99 finden
      PVE_AUTH="Authorization: PVEAPIToken=${PKR_VAR_proxmox_username}=${PKR_VAR_proxmox_token}"
      PVE_NODE="${PKR_VAR_proxmox_node:-PVE1}"
      RANGE_START=${TEMPLATE_BASE_ID}
      RANGE_END=$((TEMPLATE_BASE_ID + 99))

      # Alle belegten VM-IDs im Range abfragen
      USED_IDS=$(curl -sfk "${PKR_VAR_proxmox_url}/nodes/${PVE_NODE}/qemu" \
        -H "${PVE_AUTH}" | jq -r "[.data[].vmid | select(. >= ${RANGE_START} and . <= ${RANGE_END})] | sort | .[]")

      # Naechste freie ID finden
      VM_ID=""
      for ID in $(seq ${RANGE_START} ${RANGE_END}); do
        if ! echo "${USED_IDS}" | grep -q "^${ID}$"; then
          VM_ID=${ID}
          break
        fi
      done

      if [ -z "${VM_ID}" ]; then
        echo "FEHLER: Keine freie VM-ID im Bereich ${RANGE_START}-${RANGE_END}!"
        exit 1
      fi

      # VM-ID in Datei speichern fuer after_script Cleanup und deploy Stage
      echo "${VM_ID}" > /tmp/packer-vm-id-${CI_PIPELINE_ID}
      mkdir -p ${CI_PROJECT_DIR}/build-artifacts
      echo "${VM_ID}" > ${CI_PROJECT_DIR}/build-artifacts/vm-id.txt
      echo "${TEMPLATE_NAME}" > ${CI_PROJECT_DIR}/build-artifacts/template-name.txt

      # Letzten Git-Tag ermitteln
      GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "unreleased")

      echo "================================================="
      echo "  Template Build: ${TEMPLATE_NAME}"
      echo "  VM-ID: ${VM_ID} (Range: ${RANGE_START}-${RANGE_END})"
      echo "  Pipeline: ${CI_PIPELINE_IID} (${CI_PIPELINE_SOURCE})"
      echo "  Commit: ${CI_COMMIT_SHORT_SHA} (${CI_COMMIT_REF_NAME})"
      echo "  Release: ${GIT_TAG}"
      echo "================================================="

      # Build mit mehr Ressourcen (schnellere Paket-Installation)
      # Template-Defaults (50G Disk, 4 GB RAM, 4 Cores) werden nach Build wiederhergestellt
      packer build \
        -var "proxmox_url=${PKR_VAR_proxmox_url}" \
        -var "proxmox_username=${PKR_VAR_proxmox_username}" \
        -var "proxmox_token=${PKR_VAR_proxmox_token}" \
        -var "proxmox_node=${PKR_VAR_proxmox_node:-PVE1}" \
        -var "proxmox_skip_tls=true" \
        -var "vm_storage_pool=${PKR_VAR_vm_storage_pool:-nvme}" \
        -var "vm_bridge=${PKR_VAR_vm_bridge:-vnet60}" \
        -var "iso_file=${PKR_VAR_iso_file:-${DEFAULT_ISO_FILE}}" \
        -var "vm_id=${VM_ID}" \
        -var "vm_name=${TEMPLATE_OS}-${TEMPLATE_VERSION}-packer-${CI_PIPELINE_ID}" \
        -var "template_name=${TEMPLATE_NAME}" \
        -var "vm_cpu_cores=6" \
        -var "vm_memory=8192" \
        -var "ci_pipeline_id=${CI_PIPELINE_ID}" \
        -var "ci_pipeline_source=${CI_PIPELINE_SOURCE}" \
        -var "ci_commit_sha=${CI_COMMIT_SHA}" \
        -var "ci_commit_ref=${CI_COMMIT_REF_NAME}" \
        -var "git_release_tag=${GIT_TAG}" \
        -on-error=${PACKER_ON_ERROR:-cleanup} \
        .

      # Build erfolgreich — Template-Hardware auf Defaults zuruecksetzen
      echo "Template-Hardware auf Defaults setzen (4 Cores, 4 GB RAM)..."
      PVE_AUTH="Authorization: PVEAPIToken=${PKR_VAR_proxmox_username}=${PKR_VAR_proxmox_token}"
      curl -sfk -X POST "${PKR_VAR_proxmox_url}/nodes/${PKR_VAR_proxmox_node:-PVE1}/qemu/${VM_ID}/config" \
        -H "${PVE_AUTH}" \
        -d "cores=4&memory=4096" || true

      # Build erfolgreich — VM-ID Datei entfernen (kein Cleanup noetig)
      rm -f /tmp/packer-vm-id-${CI_PIPELINE_ID}

      echo ""
      echo "================================================="
      echo "  Template erfolgreich erstellt!"
      echo "  Name:     ${TEMPLATE_NAME}"
      echo "  VM-ID:    ${VM_ID}"
      echo "  Pipeline: ${GITLAB_PROJECT_URL}/-/pipelines/${CI_PIPELINE_ID}"
      echo "================================================="
  after_script:
    - |
      # Opt-in: Fehlgeschlagene Build-VM fuer Debugging erhalten
      # Aktivieren per Push-Option: git push -o ci.variable="KEEP_FAILED_VM=true"
      if [ "${KEEP_FAILED_VM:-false}" = "true" ]; then
        VM_ID_FILE="/tmp/packer-vm-id-${CI_PIPELINE_ID}"
        if [ -f "${VM_ID_FILE}" ]; then
          VM_ID=$(cat "${VM_ID_FILE}")
          echo "================================================="
          echo "  KEEP_FAILED_VM=true — Cleanup uebersprungen"
          echo "  Build-VM ${VM_ID} bleibt erhalten fuer Debugging"
          echo "  Manuelles Aufraeumen ueber Proxmox UI noetig"
          echo "================================================="
          rm -f "${VM_ID_FILE}"
        fi
        exit 0
      fi

      # Cleanup: NUR die eigene Build-VM entfernen (bei Abbruch oder Fehler)
      # WICHTIG: Nie fremde VMs loeschen — nur die VM-ID aus der eigenen Datei
      VM_ID_FILE="/tmp/packer-vm-id-${CI_PIPELINE_ID}"
      if [ -f "${VM_ID_FILE}" ]; then
        VM_ID=$(cat "${VM_ID_FILE}")

        # Sicherheitscheck: VM-Name muss zum eigenen Pipeline-IID passen
        PVE_AUTH="Authorization: PVEAPIToken=${PKR_VAR_proxmox_username}=${PKR_VAR_proxmox_token}"
        VM_NAME=$(curl -sfk "${PKR_VAR_proxmox_url}/nodes/${PKR_VAR_proxmox_node:-PVE1}/qemu/${VM_ID}/config" \
          -H "${PVE_AUTH}" 2>/dev/null | jq -r '.data.name // ""')

        if echo "${VM_NAME}" | grep -q "packer-${CI_PIPELINE_ID}"; then
          echo "================================================="
          echo "  CLEANUP: Build abgebrochen/fehlgeschlagen"
          echo "  Entferne eigene VM ${VM_ID} (${VM_NAME})..."
          echo "================================================="
          curl -sfk -X POST \
            "${PKR_VAR_proxmox_url}/nodes/${PKR_VAR_proxmox_node:-PVE1}/qemu/${VM_ID}/status/stop" \
            -H "${PVE_AUTH}" 2>/dev/null || true
          sleep 5
          curl -sfk -X DELETE \
            "${PKR_VAR_proxmox_url}/nodes/${PKR_VAR_proxmox_node:-PVE1}/qemu/${VM_ID}?purge=1&destroy-unreferenced-disks=1" \
            -H "${PVE_AUTH}" 2>/dev/null || true
          echo "  VM ${VM_ID} (${VM_NAME}) entfernt."
        else
          echo "WARNUNG: VM ${VM_ID} gehoert nicht zu Pipeline ${CI_PIPELINE_IID} (Name: ${VM_NAME}). NICHT geloescht."
        fi
        rm -f "${VM_ID_FILE}"
      else
        echo "Kein Cleanup noetig (Build war erfolgreich oder VM-ID nicht gefunden)."
      fi
  artifacts:
    name: "${TEMPLATE_OS}-${TEMPLATE_VERSION}-build-${CI_PIPELINE_IID}"
    paths:
      - build-artifacts/
    expire_in: 1 day
    when: on_success

# --- Tag-Rotation Base ---
.tag_rotation_base:
  stage: deploy
  tags:
    - packer
  environment:
    name: templates/${TEMPLATE_OS}-${TEMPLATE_VERSION}
    action: start
  script:
    - |
      # VM-ID und Template-Name aus Build-Artefakten lesen
      VM_ID=$(cat build-artifacts/vm-id.txt)
      TEMPLATE_NAME=$(cat build-artifacts/template-name.txt)

      echo "Tag-Rotation: latest auf VM ${VM_ID} (${TEMPLATE_NAME}) setzen..."
      PVE_AUTH="Authorization: PVEAPIToken=${PKR_VAR_proxmox_username}=${PKR_VAR_proxmox_token}"
      PVE_NODE="${PKR_VAR_proxmox_node:-PVE1}"
      PVE_URL="${PKR_VAR_proxmox_url}"

      # 1. Aktuelle Tags des neuen Templates lesen
      NEW_TAGS=$(curl -sfk "${PVE_URL}/nodes/${PVE_NODE}/qemu/${VM_ID}/config" \
        -H "${PVE_AUTH}" | jq -r '.data.tags // ""')
      echo "  Neue Template Tags: ${NEW_TAGS}"

      # 2. latest Tag hinzufuegen und building Tag entfernen (Build ist fertig)
      FINAL_TAGS=$(echo "${NEW_TAGS};latest" | sed 's/;building//g; s/building;//g')
      if curl -sfk -X POST "${PVE_URL}/nodes/${PVE_NODE}/qemu/${VM_ID}/config" \
        -H "${PVE_AUTH}" \
        --data-urlencode "tags=${FINAL_TAGS}"; then
        echo "  latest Tag gesetzt, building Tag entfernt auf VM ${VM_ID}"
      else
        echo "  WARNUNG: Tags konnten nicht gesetzt werden auf VM ${VM_ID}"
      fi

      # 3. Alle anderen VMs mit latest + gleicher OS-Version finden und latest entfernen
      #    Filter: os-${TEMPLATE_OS} UND v-${TEMPLATE_VERSION} (nicht nur OS!)
      for OLD_VMID in $(curl -sfk "${PVE_URL}/nodes/${PVE_NODE}/qemu" \
        -H "${PVE_AUTH}" | jq -r ".data[] | select(.tags != null) | select(.tags | contains(\"latest\")) | select(.tags | contains(\"os-${TEMPLATE_OS}\")) | select(.tags | contains(\"v-${TEMPLATE_VERSION}\")) | .vmid"); do
        if [ "$OLD_VMID" != "$VM_ID" ]; then
          OLD_TAGS=$(curl -sfk "${PVE_URL}/nodes/${PVE_NODE}/qemu/${OLD_VMID}/config" \
            -H "${PVE_AUTH}" | jq -r '.data.tags // ""')
          # latest entfernen
          CLEANED_TAGS=$(echo "$OLD_TAGS" | sed 's/;latest//g; s/latest;//g; s/^latest$//g')
          if [ -n "$CLEANED_TAGS" ]; then
            curl -sfk -X POST "${PVE_URL}/nodes/${PVE_NODE}/qemu/${OLD_VMID}/config" \
              -H "${PVE_AUTH}" \
              --data-urlencode "tags=${CLEANED_TAGS}" || true
            echo "  latest Tag von VM ${OLD_VMID} entfernt (Tags: ${CLEANED_TAGS})"
          fi
        fi
      done

      # 4. Alte Templates aufräumen: nur current (latest) + previous behalten
      #    SICHERHEIT: Nur VM-IDs im Bereich 9000-9999 werden angefasst!
      #    SORTIERUNG: Nach Build-Nummer aus Template-Name (bXX), nicht nach VM-ID
      echo ""
      echo "  Cleanup: Alte Templates der gleichen OS-Version entfernen..."

      # Templates mit Build-Nummer sammeln: "build_nr vmid" pro Zeile, absteigend sortiert
      TEMPLATE_LIST=$(curl -sfk "${PVE_URL}/nodes/${PVE_NODE}/qemu" \
        -H "${PVE_AUTH}" | jq -r ".data[] | select(.template == 1) | select(.tags != null) | select(.tags | contains(\"os-${TEMPLATE_OS}\")) | select(.tags | contains(\"v-${TEMPLATE_VERSION}\")) | \"\(.name) \(.vmid)\"")

      # Build-Nummer aus Name extrahieren (tmpl-...-bXX) und absteigend sortieren
      SORTED_TEMPLATES=$(echo "${TEMPLATE_LIST}" | while read -r NAME VMID; do
        BUILD_NUM=$(echo "${NAME}" | grep -oP '(?<=-b)\d+$' || echo "0")
        echo "${BUILD_NUM} ${VMID} ${NAME}"
      done | sort -t' ' -k1 -rn)

      KEEP_COUNT=0
      echo "${SORTED_TEMPLATES}" | while read -r BUILD_NUM TMPL_VMID TMPL_NAME; do
        [ -z "$TMPL_VMID" ] && continue

        # Sicherheitscheck: NUR VM-IDs im Range 9000-9999
        if [ "$TMPL_VMID" -lt 9000 ] || [ "$TMPL_VMID" -gt 9999 ]; then
          echo "  SKIP: VM ${TMPL_VMID} (${TMPL_NAME}) liegt ausserhalb 9000-9999 — wird NICHT angefasst"
          continue
        fi

        KEEP_COUNT=$((KEEP_COUNT + 1))
        if [ "$KEEP_COUNT" -le 2 ]; then
          echo "  BEHALTEN: VM ${TMPL_VMID} (${TMPL_NAME}, Build b${BUILD_NUM}) — Platz ${KEEP_COUNT}/2"
        else
          echo "  LOESCHEN: VM ${TMPL_VMID} (${TMPL_NAME}, Build b${BUILD_NUM}) — aelter als die 2 neuesten"
          curl -sfk -X POST "${PVE_URL}/nodes/${PVE_NODE}/qemu/${TMPL_VMID}/status/stop" \
            -H "${PVE_AUTH}" 2>/dev/null || true
          sleep 2
          curl -sfk -X DELETE "${PVE_URL}/nodes/${PVE_NODE}/qemu/${TMPL_VMID}?purge=1&destroy-unreferenced-disks=1" \
            -H "${PVE_AUTH}" 2>/dev/null || true
          echo "  VM ${TMPL_VMID} entfernt."
        fi
      done

      GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "unreleased")

      echo ""
      echo "================================================="
      echo "  Tag-Rotation + Cleanup abgeschlossen!"
      echo "  Name:     ${TEMPLATE_NAME}"
      echo "  VM-ID:    ${VM_ID}"
      echo "  Tags:     latest, os-${TEMPLATE_OS}, v-${TEMPLATE_VERSION}, packer"
      echo "  Behalten: max. 2 Templates pro OS-Version (current + previous)"
      echo "  Release:  ${GITLAB_PROJECT_URL}/-/releases/${GIT_TAG}"
      echo "  Pipeline: ${GITLAB_PROJECT_URL}/-/pipelines/${CI_PIPELINE_ID}"
      echo "================================================="

# =============================================================================
# Ubuntu 24.04
# =============================================================================

validate_ubuntu_2404:
  extends: .packer_validate_base
  variables:
    PACKER_DIR: packer/linux/ubuntu-2404
    TEMPLATE_OS: ubuntu
    TEMPLATE_VERSION: "2404"
    DEFAULT_ISO_FILE: "datacenter:iso/ubuntu-24.04.4-live-server-amd64.iso"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH
      changes:
        - packer/linux/ubuntu-2404/**/*
        - profiles/base.yml
        - ansible/playbooks/packer-hardening.yml
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

build_ubuntu_2404:
  extends: .packer_build_base
  variables:
    PACKER_DIR: packer/linux/ubuntu-2404
    TEMPLATE_OS: ubuntu
    TEMPLATE_VERSION: "2404"
    TEMPLATE_BASE_ID: "9000"
    DEFAULT_ISO_FILE: "datacenter:iso/ubuntu-24.04.4-live-server-amd64.iso"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - packer/linux/ubuntu-2404/**/*
        - profiles/base.yml
        - ansible/playbooks/packer-hardening.yml

rotate_latest_ubuntu_2404:
  extends: .tag_rotation_base
  needs:
    - job: build_ubuntu_2404
      artifacts: true
  variables:
    TEMPLATE_OS: ubuntu
    TEMPLATE_VERSION: "2404"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - packer/linux/ubuntu-2404/**/*
        - profiles/base.yml
        - ansible/playbooks/packer-hardening.yml

