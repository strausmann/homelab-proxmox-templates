# =============================================================================
# Release Stage (unveraendert)
# =============================================================================

release:
  stage: release
  image: node:22-slim
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npx --no-install semantic-release
  tags:
    - packer
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH
      when: never
