---
stages:
  - validate
  - build
  - release

variables:
  PACKER_VERSION: "1.12.0"
  # Proxmox Verbindung (CI/CD Variablen)
  # PKR_VAR_proxmox_url, PKR_VAR_proxmox_username, PKR_VAR_proxmox_token
  # werden als CI/CD Variablen gesetzt (masked + protected)

# --- Validate Stage ---
packer_validate:
  stage: validate
  image: hashicorp/packer:${PACKER_VERSION}
  before_script:
    - packer init packer/linux/ubuntu-2404/
  script:
    - packer validate -var-file=packer/linux/ubuntu-2404/ubuntu-2404.auto.pkrvars.hcl packer/linux/ubuntu-2404/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH
      changes:
        - packer/**/*
        - profiles/**/*
        - ansible/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# --- Build Stage ---
.packer_build:
  stage: build
  image: hashicorp/packer:${PACKER_VERSION}
  before_script:
    - apk add --no-cache ansible openssh-client
    - packer init packer/linux/ubuntu-2404/
  tags:
    - dind  # Runner mit Netzwerkzugang zu Proxmox

build_ubuntu_2404:
  extends: .packer_build
  script:
    - |
      packer build \
        -var "proxmox_url=${PKR_VAR_proxmox_url}" \
        -var "proxmox_username=${PKR_VAR_proxmox_username}" \
        -var "proxmox_token=${PKR_VAR_proxmox_token}" \
        -var "proxmox_node=${PKR_VAR_proxmox_node:-PVE1}" \
        -var "proxmox_skip_tls=true" \
        -var "vm_storage_pool=${PKR_VAR_vm_storage_pool:-nvme}" \
        -var "iso_storage_pool=${PKR_VAR_iso_storage_pool:-datacenter}" \
        -var "vm_bridge=${PKR_VAR_vm_bridge:-vmbr0}" \
        -on-error=cleanup \
        packer/linux/ubuntu-2404/
  rules:
    # Manueller Trigger
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    # Scheduled (monatlich)
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Nach Merge auf main wenn sich relevante Dateien geaendert haben
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - packer/linux/ubuntu-2404/**/*
        - profiles/base.yml
        - ansible/playbooks/packer-hardening.yml
      when: manual
      allow_failure: true

# --- Release Stage ---
release:
  stage: release
  image: node:22-slim
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npx --no-install semantic-release
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
