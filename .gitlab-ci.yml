# =============================================================================
# Release Stage (unveraendert)
# =============================================================================

release:
  stage: release
  script:
    - |
      REPO_URL="https://oauth2:${GL_TOKEN}@git.strausmann.de/strausmann/proxmox-templates.git"
      docker run --rm \
        --user "$(id -u):$(id -g)" \
        -v "${CI_PROJECT_DIR}:/app" \
        -w /app \
        -e HOME=/tmp \
        -e CI=true \
        -e GITLAB_CI=true \
        -e CI_SERVER_URL="${CI_SERVER_URL}" \
        -e CI_PROJECT_ID="${CI_PROJECT_ID}" \
        -e CI_PROJECT_PATH="${CI_PROJECT_PATH}" \
        -e CI_COMMIT_BRANCH="${CI_COMMIT_BRANCH}" \
        -e CI_COMMIT_SHA="${CI_COMMIT_SHA}" \
        -e CI_REPOSITORY_URL="${REPO_URL}" \
        -e GL_TOKEN="${GL_TOKEN}" \
        -e GITLAB_URL="${CI_SERVER_URL}" \
        -e GIT_AUTHOR_NAME="${GIT_AUTHOR_NAME}" \
        -e GIT_AUTHOR_EMAIL="${GIT_AUTHOR_EMAIL}" \
        -e GIT_COMMITTER_NAME="${GIT_COMMITTER_NAME}" \
        -e GIT_COMMITTER_EMAIL="${GIT_COMMITTER_EMAIL}" \
        node:22 bash -c "git config --global --add safe.directory /app && git remote set-url origin ${REPO_URL} && git checkout -B ${CI_COMMIT_BRANCH} && npm ci --prefer-offline && npx --no-install semantic-release --branches main"
  tags:
    - packer
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
