---
# Base Linux Playbook — Post-Provisioning nach Terraform
# Installiert Grundausstattung auf jeder neuen Ubuntu/Debian VM
- name: Base Linux Konfiguration
  hosts: all
  become: true

  vars:
    homelab_ssh_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK6gqu8YPR+KppBxvK+rsQHKeWq5jY/zC5HJO3sPmx1K ansible-vm-homelab-nodes"
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIARsgv7N7lCpWsn2jy8w8Se2sqKulcaAM8ACIda4B7gm strausmann"

  tasks:
    # --- Timezone ---
    - name: Timezone auf Europe/Berlin setzen
      community.general.timezone:
        name: Europe/Berlin

    # --- System-Updates ---
    - name: System aktualisieren
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
        cache_valid_time: 3600

    # --- SSH Keys sicherstellen ---
    - name: SSH Keys fuer root hinterlegen
      ansible.posix.authorized_key:
        user: root
        key: "{{ item }}"
        state: present
      loop: "{{ homelab_ssh_keys }}"

    - name: SSH Keys fuer ubuntu User hinterlegen
      ansible.posix.authorized_key:
        user: ubuntu
        key: "{{ item }}"
        state: present
      loop: "{{ homelab_ssh_keys }}"
      ignore_errors: true

    # --- Tailscale ---
    - name: Tailscale GPG Key hinzufuegen
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"

    - name: Tailscale Repository hinzufuegen
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main"
        state: present
        filename: tailscale

    - name: Tailscale installieren
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true

    - name: Tailscale Daemon aktivieren
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started

    # --- Firewall (ufw) ---
    - name: UFW installieren
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: UFW SSH erlauben
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: UFW Tailscale erlauben
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in

    - name: UFW aktivieren
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming
